name: Update Version

on:
  push:
    branches:
      - main

jobs:
  update-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Read version from README.md
        id: version
        run: |
          VERSION=$(grep -oP 'Version:\s*\K\d+\.\d+\.\d+' README.md)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Create version.txt
        run: |
          echo "${{ steps.version.outputs.VERSION }}" > version.txt

      - name: Commit version.txt
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add version.txt
          git commit -m 'Update version' || echo "No changes"
          git push
